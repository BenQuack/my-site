<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>About Me</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Cinzel:wght@300;400&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="./style.css" />
</head>
<body class="page-enter">

  <!-- ============================================================
       UNDERWATER SCENE
       Full-viewport background.
       Bubbles and seaweed are appended by about.js at runtime.
       ============================================================ -->
  <div id="underwater-page">
    <div class="caustic"></div>

    <!-- Three blurred light shafts filter down from the surface -->
    <div class="light-shaft"></div>
    <div class="light-shaft"></div>
    <div class="light-shaft"></div>
  </div>

  <!-- ============================================================
       ABOUT ME CONTENT
       Centred overlay on top of the underwater scene.
       ============================================================ -->
  <div id="underwater-content" class="visible">
    <div class="about-title">About Me</div>
    <div class="about-text">
      Drifting through ideas beneath the surface —
      a creator, builder, and explorer of the deep.
    </div>
  </div>

  <!-- Back button — navigates to index.html via about.js -->
  <div id="back-btn" class="visible">&#8593; Surface</div>

  <script src="./about.js"></script>
</body>
</html>
